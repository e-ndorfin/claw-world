# See https://fly.io/docs/reference/configuration/ for reference

app = "claw-world"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  ROOM_NAME = "Lobster Room"
  WORLD_PORT = "18800"

# Set ROOM_TOKEN via: fly secrets set ROOM_TOKEN=your-secret-here

[http_service]
  internal_port = 18800
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
